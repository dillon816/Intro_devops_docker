stages:
  - test
  - build
  - deploy

# Template commun : image Node + cache node_modules
.node-base:
  image: node:18-alpine
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
  before_script:
    - npm ci

# ── PHASE 1 : Tests unitaires (sans base de données) ──────────────────────────
test-unit:
  extends: .node-base
  stage: test
  script:
    - npm test
