name: CI - Todo API

on:
  push:
    branches: ["main", "feat/**", "build"]
  pull_request:
    branches: ["main"]

jobs:

  # PHASE 1 : Tests unitaires 
  test-unit:
    name: Tests unitaires
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Lancer les tests unitaires
        run: npm test

  # PHASE 2 : Tests d'intégration (avec PostgreSQL) 
  test-integration:
    name: Tests d'intégration
    runs-on: ubuntu-latest
    needs: test-unit        # attend que test-unit soit vert avant de lancer

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: todo_test
          POSTGRES_USER: todo_user
          POSTGRES_PASSWORD: todo_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U todo_user -d todo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost     
      DB_PORT: 5432
      DB_NAME: todo_test
      DB_USER: todo_user
      DB_PASSWORD: todo_pass
      NODE_ENV: test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Lancer les tests d'intégration
        run: npm run test:integration

  # PHASE 3 : Build Docker (validation Dockerfile — toutes les branches)
  docker-build:
    name: Build Docker (validation)
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build de l'image Docker (sans push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: todo-api:ci-check

  # PHASE 3 : Push DockerHub — uniquement sur main
  # Secrets requis : DOCKERHUB_USERNAME et DOCKERHUB_TOKEN (GitHub > Settings > Secrets)
  docker-push:
    name: Push Docker Hub
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Génération des métadonnées de l'image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/todo-api
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build et push de l'image Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max