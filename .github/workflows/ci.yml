name: CI - Todo API

on:
  push:
    branches: ["main", "feat/**"]
  pull_request:
    branches: ["main"]

jobs:

  # PHASE 1 : Tests unitaires 
  test-unit:
    name: Tests unitaires
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Lancer les tests unitaires
        run: npm test

  # PHASE 2 : Tests d'intégration (avec PostgreSQL) 
  test-integration:
    name: Tests d'intégration
    runs-on: ubuntu-latest
    needs: test-unit        # attend que test-unit soit vert avant de lancer

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: todo_test
          POSTGRES_USER: todo_user
          POSTGRES_PASSWORD: todo_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U todo_user -d todo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost     
      DB_PORT: 5432
      DB_NAME: todo_test
      DB_USER: todo_user
      DB_PASSWORD: todo_pass
      NODE_ENV: test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Lancer les tests d'intégration
        run: npm run test:integration