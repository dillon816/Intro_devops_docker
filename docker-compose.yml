services:
  api:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - api-logs:/app/logs
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:
  api-logs: